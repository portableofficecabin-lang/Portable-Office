# ─────────────────────────────────────────────────────────────────────────────
# Self-hosted reverse-proxy + micro-cache for the Next.js standalone origin.
# This is NOT a third-party CDN — it is your own nginx sitting in front of the
# Node server (same host / same private network). It exists to:
#   1. Speak HTTP/2 + keep-alive to clients (the stock Next standalone server is
#      HTTP/1.1) → fewer round-trips → lower TTFB on warm connections + faster FCP.
#   2. Brotli/gzip-compress responses (smaller CSS/JS/HTML transfer → faster FCP).
#   3. Micro-cache public SEO HTML for a few seconds with stale-while-revalidate,
#      so cold ISR renders / traffic spikes are absorbed at the edge instead of
#      hitting the Node renderer on every request → lower, flatter TTFB.
#
# IMPORTANT: place this nginx in the SAME region as your users (India / ap-south)
# for it to help the *network* TTFB. If TLS is already terminated upstream (a
# managed load balancer), put these `location`/cache rules in THAT proxy instead —
# a same-host nginx behind a far-away LB cannot reduce the India↔origin RTT.
#
# Private routes (admin/cart/checkout/login/register/my-account/forgot/reset/auth)
# and any request carrying a session cookie are HARD-bypassed so user/session/cart
# data is never cached. The origin also sends `no-store` for those (next.config.ts),
# so this is defense-in-depth.
# ─────────────────────────────────────────────────────────────────────────────

# Micro-cache store (tmpfs recommended: mount /var/cache/nginx as tmpfs for speed).
proxy_cache_path /var/cache/nginx/poc levels=1:2 keys_zone=poc_cache:50m
                 max_size=1g inactive=600s use_temp_path=off;

upstream nextjs_origin {
    # The Next.js standalone container/process. Adjust host:port to your setup
    # (e.g. 127.0.0.1:3000, or the docker-compose service name `app:3000`).
    server 127.0.0.1:3000;
    keepalive 64;
}

# Map: is this a PRIVATE request that must never be cached?
# True when the path is a private route OR a Supabase/auth session cookie is present.
map $request_uri $is_private_path {
    default                              0;
    "~^/admin"                           1;
    "~^/cart"                            1;
    "~^/checkout"                        1;
    "~^/login"                           1;
    "~^/register"                        1;
    "~^/my-account"                      1;
    "~^/forgot-password"                 1;
    "~^/reset-password"                  1;
    "~^/auth"                            1;
}
map $http_cookie $has_session_cookie {
    default            0;
    "~*sb-"            1;   # Supabase auth cookies (sb-access-token, sb-…)
    "~*authToken"      1;
}
# Only GET/HEAD of non-private, cookieless requests are cacheable.
map "$request_method:$is_private_path:$has_session_cookie" $skip_cache {
    default            1;   # skip by default
    "~^GET:0:0$"       0;   # cache only safe public reads
    "~^HEAD:0:0$"      0;
}

server {
    listen 443 ssl;
    http2 on;
    server_name portableofficecabin.com www.portableofficecabin.com;

    # ── TLS (point these at your cert; or terminate TLS upstream and use :80) ──
    ssl_certificate     /etc/ssl/certs/portableofficecabin.crt;
    ssl_certificate_key /etc/ssl/private/portableofficecabin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;   # TLS session resumption → fewer RTTs
    ssl_session_tickets on;

    # ── Compression (faster FCP). brotli needs ngx_brotli; gzip is built-in. ──
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml font/woff2;
    gzip_vary on;
    # brotli on;            # uncomment if your nginx build has ngx_brotli
    # brotli_comp_level 5;
    # brotli_types text/css application/javascript application/json image/svg+xml text/html;

    # Immutable build assets — long cache, no micro-cache needed.
    location /_next/static/ {
        proxy_pass http://nextjs_origin;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Optimized images — cache hard (content-addressed). Persists sharp output.
    location /_next/image {
        proxy_pass http://nextjs_origin;
        proxy_set_header Host $host;
        proxy_cache poc_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_key "$scheme$host$request_uri";
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Everything else: public HTML micro-cache + private bypass.
    location / {
        proxy_pass http://nextjs_origin;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache poc_cache;
        # Cache key excludes cookies → all anonymous visitors share one cached copy.
        proxy_cache_key "$scheme$host$request_uri";

        # HARD bypass for private/cookie'd requests (never store user/session data).
        proxy_cache_bypass $skip_cache;     # don't SERVE from cache
        proxy_no_cache     $skip_cache;     # don't STORE in cache

        # Respect the origin Cache-Control (next.config.ts already sends `no-store`
        # for private routes and `public, s-maxage=…, stale-while-revalidate=…`
        # for SEO pages). Give static/ISR HTML a small floor + serve stale safely.
        proxy_cache_valid 200 301 302 60s;
        proxy_cache_valid 404 10s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;   # revalidate in the background (SWR)
        proxy_cache_lock on;                # collapse a render stampede into 1 origin hit

        add_header X-Cache-Status $upstream_cache_status always;
    }
}

# Optional: plain-HTTP variant if TLS is terminated by an upstream LB.
# Replace the `server { listen 443 ssl; http2 on; … }` above with `listen 80;`
# and drop the ssl_* / 443 lines — the cache + bypass logic is identical.
